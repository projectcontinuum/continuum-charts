# =============================================================================
# Project Continuum — SSO Development Environment Overrides
# =============================================================================
# Usage:
#   helm install continuum-sso ./continuum-sso -f continuum-sso/values-dev.yaml -n continuum-dev
#
# This file supplies development-specific configurations for SSO.
#
# WARNING: The configurations below are for DEVELOPMENT ONLY.
# =============================================================================

# -----------------------------------------------------------------------------
# Keycloak — Identity Provider
# -----------------------------------------------------------------------------
keycloak:
  enabled: true

  auth:
    # Use existing secret for admin credentials
    existingSecret: keycloak-admin

  # Database configuration - use PostgreSQL from continuum-infra
  database:
    enabled: true
    vendor: "postgres"
    url: "jdbc:postgresql://continuum-infra-postgresql:5432/keycloak"
    existingSecret: keycloak-db

  # Ingress for dev environment
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
      nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    hosts:
      - host: keycloak.192.168.49.2.nip.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - "*.192.168.49.2.nip.io"
        secretName: continuum-tls

  # Dev resources
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -----------------------------------------------------------------------------
# OAuth2 Proxy
# -----------------------------------------------------------------------------
oauth2Proxy:
  enabled: true
  # Keycloak configuration
  keycloak:
    issuerUrl: "https://keycloak.192.168.49.2.nip.io/realms/continuum"
    # Use existing secret for credentials in dev
    existingSecret: oauth2-proxy-client-creds
  # OAuth2 Proxy settings
  publicHost: "auth.192.168.49.2.nip.io"
  cookieDomain: "192.168.49.2.nip.io"
  cookie:
    existingSecret: oauth2-proxy-cookie
    secure: true
  # Ingress for dev environment
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: auth.192.168.49.2.nip.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - auth.192.168.49.2.nip.io
        secretName: continuum-tls
  # Dev resources
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
