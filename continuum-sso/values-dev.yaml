# =============================================================================
# Project Continuum — SSO Development Environment Overrides
# =============================================================================
# Usage:
#   helm install continuum-sso ./continuum-sso -f continuum-sso/values-dev.yaml -n continuum-dev
#
# This file supplies development-specific configurations for SSO.
#
# WARNING: The configurations below are for DEVELOPMENT ONLY.
# =============================================================================

# -----------------------------------------------------------------------------
# OAuth2 Proxy — development configuration
# -----------------------------------------------------------------------------
oauth2Proxy:
  enabled: true
  publicHost: "auth.192.168.49.2.nip.io"
  cookieDomain: "192.168.49.2.nip.io"
  cookie:
    existingSecret: oauth2-proxy-cookie
    secure: true  # Enable secure cookies (requires HTTPS)
  providers:
    google:
      enabled: true
      existingSecret: oauth2-proxy-google
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    github:
      enabled: false
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    microsoft:
      enabled: false
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    linkedin:
      enabled: false
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi


