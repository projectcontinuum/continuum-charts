{{- if .Values.keycloak.enabled }}
{{- $fullname := include "continuum-sso.fullname" . }}
{{- $auth := .Values.keycloak.auth }}
{{- $db := .Values.keycloak.database }}

{{/* Only create secret if not using existing secrets */}}
{{- if not $auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-keycloak
  labels:
    {{- include "continuum-sso.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
data:
  admin-user: {{ $auth.adminUser | default "admin" | b64enc | quote }}
  {{- if $auth.adminPassword }}
  admin-password: {{ $auth.adminPassword | b64enc | quote }}
  {{- else }}
  admin-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- if and $db.enabled (not $db.existingSecret) }}
  db-username: {{ $db.username | default "keycloak" | b64enc | quote }}
  {{- if $db.password }}
  db-password: {{ $db.password | b64enc | quote }}
  {{- else }}
  db-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}

