{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.infra.enabled }}
{{- $fullname := include "continuum-sso.fullname" . }}
{{- $oauth2Enabled := .Values.oauth2Proxy.enabled }}
{{- $oauth2Provider := .Values.ingress.oauth2Provider | default "google" }}
{{- $oauth2Host := .Values.ingress.oauth2.host | default .Values.oauth2Proxy.publicHost }}
{{- $oauth2Scheme := ternary "https" "http" (gt (len .Values.ingress.tls) 0) }}

{{/* Check if the selected provider is enabled */}}
{{- $providerEnabled := false }}
{{- if $oauth2Enabled }}
{{- range $providerName, $provider := .Values.oauth2Proxy.providers }}
{{- if and $provider.enabled (eq $providerName $oauth2Provider) }}
{{- $providerEnabled = true }}
{{- end }}
{{- end }}
{{- end }}

{{/* Main Infrastructure UIs Ingress */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-infra-uis
  labels:
    {{- include "continuum-sso.labels" . | nindent 4 }}
    app.kubernetes.io/component: infra-ingress
  annotations:
    {{- if eq (len .Values.ingress.tls) 0 }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
    {{- if $providerEnabled }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ $fullname }}-oauth2-proxy-{{ $oauth2Provider }}.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/{{ $oauth2Provider }}/auth"
    nginx.ingress.kubernetes.io/auth-signin: "{{ $oauth2Scheme }}://{{ $oauth2Host }}/oauth2/{{ $oauth2Provider }}/start?rd={{ $oauth2Scheme }}://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    nginx.ingress.kubernetes.io/auth-signin-redirect-param: "rd"
    nginx.ingress.kubernetes.io/proxy-set-headers: "{{ .Release.Namespace }}/{{ $fullname }}-custom-headers"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.ingress.infra.temporalUi.enabled }}
    - host: {{ .Values.ingress.infra.temporalUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.infra.temporalUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-sso.infra.temporal-web" . }}
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.infra.kafkaUi.enabled }}
    - host: {{ .Values.ingress.infra.kafkaUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.infra.kafkaUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-sso.infra.kafka-ui" . }}
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.infra.minioConsole.enabled }}
    - host: {{ .Values.ingress.infra.minioConsole.host }}
      http:
        paths:
          - path: {{ .Values.ingress.infra.minioConsole.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-sso.infra.minio" . }}
                port:
                  number: 9001
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{/* Mosquitto WebSocket gets a separate Ingress for long-lived connection annotations */}}
{{- if .Values.ingress.infra.mosquitto.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-mosquitto
  labels:
    {{- include "continuum-sso.labels" . | nindent 4 }}
    app.kubernetes.io/component: infra-ingress
  annotations:
    {{- if eq (len .Values.ingress.tls) 0 }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.infra.mosquitto.host }}
      http:
        paths:
          - path: {{ .Values.ingress.infra.mosquitto.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-sso.infra.mosquitto" . }}
                port:
                  number: 1884
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

