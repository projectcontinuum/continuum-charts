{{- if and .Values.ingress.enabled .Values.oauth2Proxy.enabled }}
{{- $fullname := include "continuum-sso.fullname" . }}
{{- $oauth2Provider := .Values.ingress.oauth2Provider | default "google" }}

{{/* Check if the selected provider is enabled */}}
{{- $providerEnabled := false }}
{{- range $providerName, $provider := .Values.oauth2Proxy.providers }}
{{- if and $provider.enabled (eq $providerName $oauth2Provider) }}
{{- $providerEnabled = true }}
{{- end }}
{{- end }}

{{- if $providerEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-custom-headers
  labels:
    {{- include "continuum-sso.labels" . | nindent 4 }}
data:
  # Map X-Auth-Request-Email to X-Continuum-User-Id for backend services
  # $authHeader1 is set by nginx ingress from the oauth2-proxy auth response
  X-Continuum-User-Id: "$authHeader1"
{{- end }}
{{- end }}

