{{- if .Values.landingPage.enabled }}
{{- $fullname := include "continuum-sso.fullname" . }}
{{- $keycloak := .Values.keycloak }}
{{- $oauth2Proxy := .Values.oauth2Proxy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-landing-page
  labels:
    app.kubernetes.io/component: landing-page
    {{- include "continuum-sso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.landingPage.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: landing-page
      {{- include "continuum-sso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: landing-page
        {{- include "continuum-sso.selectorLabels" . | nindent 8 }}
        {{- include "continuum-sso.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: landing-page
          image: "{{ .Values.landingPage.image.repository }}:{{ .Values.landingPage.image.tag }}"
          imagePullPolicy: {{ .Values.landingPage.image.pullPolicy | default .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            # Keycloak configuration - derived from SSO chart values
            - name: KEYCLOAK_URL
              value: {{ .Values.landingPage.keycloakUrl | default (printf "https://%s" (index .Values.keycloak.ingress.hosts 0).host) | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.landingPage.keycloakRealm | default .Values.keycloak.realm | default "continuum" | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.landingPage.keycloakClientId | default "continuum" | quote }}
            # Public URLs
            - name: PUBLIC_AUTH_URL
              value: {{ .Values.landingPage.publicAuthUrl | default (printf "https://%s" .Values.oauth2Proxy.publicHost) | quote }}
            - name: PUBLIC_APP_URL
              value: {{ .Values.landingPage.publicAppUrl | quote }}
            # Cookie domain
            - name: COOKIE_DOMAIN
              value: {{ .Values.landingPage.cookieDomain | default (printf ".%s" .Values.oauth2Proxy.cookieDomain) | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.landingPage.resources | nindent 12 }}
      {{- with .Values.landingPage.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.landingPage.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

