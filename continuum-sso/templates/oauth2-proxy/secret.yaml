{{- if .Values.oauth2Proxy.enabled }}
{{- $fullname := include "continuum-sso.fullname" . }}
{{- $keycloak := .Values.oauth2Proxy.keycloak }}
{{- $cookie := .Values.oauth2Proxy.cookie }}
{{/* Create the secret if not using existing secrets for both keycloak and cookie */}}
{{- if or (not $keycloak.existingSecret) (not $cookie.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-oauth2-proxy
  labels:
    {{- include "continuum-sso.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
type: Opaque
data:
  {{- if not $keycloak.existingSecret }}
  {{- if $keycloak.clientId }}
  client-id: {{ $keycloak.clientId | b64enc | quote }}
  {{- else }}
  client-id: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $keycloak.clientSecret }}
  client-secret: {{ $keycloak.clientSecret | b64enc | quote }}
  {{- else }}
  client-secret: {{ "" | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if not $cookie.existingSecret }}
  {{- if $cookie.secret }}
  cookie-secret: {{ $cookie.secret | b64enc | quote }}
  {{- else }}
  # WARNING: Auto-generated secret. Override in production!
  cookie-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
