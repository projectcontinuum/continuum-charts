# ============================================================
# Development overrides for continuum-platform
# Usage: helm install continuum-platform ./continuum-platform -f continuum-platform/values.yaml -f continuum-platform/values-dev.yaml -n continuum-dev --create-namespace
# ============================================================

global:
  imagePullPolicy: Always

secrets:
  postgresql:
    username: continuum_owner
    password: dev-continuum-pass
  minio:
    rootUser: "dev-minio-root"
    rootPassword: "dev-minio-secret"

# Scale down for development
cloudGateway:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

apiServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

orchestrationService:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

messageBridge:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

clusterManager:
  replicas: 1
  workbench:
    namespace: continuum-workbench-dev
    defaultImage: projectcontinuum/continuum-workbench:0.0.5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

credentialsServer:
  replicas: 1
  encryption:
    # Generate a 32-byte (256-bit) key: openssl rand -base64 32
    masterKey: "ZGV2LWNyZWRlbnRpYWxzLWVuY3J5cHRpb24ta2V5MQ=="   # dev-only key
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

featureBase:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false

featureCheminformatics:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
