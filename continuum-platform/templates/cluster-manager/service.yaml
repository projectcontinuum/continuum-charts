{{- if .Values.clusterManager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "continuum-platform.cluster-manager.fullname" . }}
  labels:
    app.kubernetes.io/component: cluster-manager
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.clusterManager.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: cluster-manager
    {{- include "continuum-platform.selectorLabels" . | nindent 4 }}
{{- end }}

