{{- if .Values.clusterManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-platform.cluster-manager.fullname" . }}
  labels:
    app.kubernetes.io/component: cluster-manager
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.clusterManager.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: cluster-manager
      {{- include "continuum-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cluster-manager
        {{- include "continuum-platform.selectorLabels" . | nindent 8 }}
        {{- include "continuum-platform.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "continuum-platform.cluster-manager.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.infra.postgresql.host }} {{ .Values.infra.postgresql.port }}; do
                echo "Waiting for PostgreSQL..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: cluster-manager
          image: "{{ .Values.clusterManager.image.repository }}:{{ .Values.clusterManager.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: CONTINUUM_DB_URL
              value: {{ include "continuum-platform.infra.db.url" . | quote }}
            - name: CONTINUUM_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.postgresql.secretName" . }}
                  key: username
            - name: CONTINUUM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.postgresql.secretName" . }}
                  key: password
            - name: WORKBENCH_DEFAULT_IMAGE
              value: {{ .Values.clusterManager.workbench.defaultImage | quote }}
            - name: WORKBENCH_NAMESPACE
              value: {{ .Values.clusterManager.workbench.namespace | quote }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.clusterManager.resources | nindent 12 }}
      {{- with .Values.clusterManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clusterManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

