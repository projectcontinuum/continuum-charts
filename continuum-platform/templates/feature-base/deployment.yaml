{{- if .Values.featureBase.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-platform.feature-base.fullname" . }}
  labels:
    app.kubernetes.io/component: feature-base
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  {{- if not .Values.featureBase.autoscaling.enabled }}
  replicas: {{ .Values.featureBase.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: feature-base
      {{- include "continuum-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: feature-base
        {{- include "continuum-platform.selectorLabels" . | nindent 8 }}
        {{- include "continuum-platform.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              KAFKA_BROKER=$(echo "{{ .Values.infra.kafka.brokerList }}" | tr ',' '\n' | head -1 | sed 's|.*://||')
              KAFKA_HOST=$(echo $KAFKA_BROKER | cut -d: -f1)
              KAFKA_PORT=$(echo $KAFKA_BROKER | cut -d: -f2)
              until nc -z $KAFKA_HOST $KAFKA_PORT; do
                echo "Waiting for Kafka..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-temporal
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.infra.temporal.host }} {{ .Values.infra.temporal.port }}; do
                echo "Waiting for Temporal..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              MINIO_HOST=$(echo "{{ .Values.infra.minio.endpoint }}" | sed 's|http[s]*://||' | cut -d: -f1)
              MINIO_PORT=$(echo "{{ .Values.infra.minio.endpoint }}" | sed 's|http[s]*://||' | cut -d: -f2)
              MINIO_PORT=${MINIO_PORT:-9000}
              until nc -z $MINIO_HOST $MINIO_PORT; do
                echo "Waiting for MinIO..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-api-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "continuum-platform.api-server.fullname" . }} {{ .Values.apiServer.service.port | default 8080 }}; do
                echo "Waiting for API Server..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: feature-base
          image: "{{ .Values.featureBase.image.repository }}:{{ .Values.featureBase.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: CONTINUUM_KAFKA_MAIN_BROKER_LIST
              value: {{ .Values.infra.kafka.brokerList | quote }}
            - name: CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY
              value: {{ .Values.infra.schemaRegistry.url | quote }}
            - name: TEMPORAL_SERVER_ADDRESS
              value: {{ include "continuum-platform.infra.temporal.address" . | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.infra.temporal.namespace | quote }}
            - name: CONTINUUM_MINIO_ENDPOINT
              value: {{ .Values.infra.minio.endpoint | quote }}
            - name: CONTINUUM_MINIO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.minio.secretName" . }}
                  key: root-user
            - name: CONTINUUM_MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.minio.secretName" . }}
                  key: root-password
            - name: CONTINUUM_API_SERVER_BASE_URL
              value: "http://{{ include "continuum-platform.api-server.fullname" . }}:{{ .Values.apiServer.service.port | default 8080 }}"
            - name: CONTINUUM_NODE_TASK_QUEUE
              value: {{ .Values.featureBase.taskQueue | quote }}
            - name: CONTINUUM_CACHE_STORAGE_PATH
              value: "{{ .Values.cacheStorage.mountPath }}/workflow-data"
            - name: CONTINUUM_KNIME_WORKFLOW_STORAGE_PATH
              value: "{{ .Values.cacheStorage.mountPath }}/knime-workflows"
            - name: CONTINUUM_KNIME_WORKSPACE_STORAGE_PATH
              value: "{{ .Values.cacheStorage.mountPath }}/knime-workspaces"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "true"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "true"
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.featureBase.resources | nindent 12 }}
          volumeMounts:
            - name: cache-storage
              mountPath: {{ .Values.cacheStorage.mountPath }}
      volumes:
        - name: cache-storage
          persistentVolumeClaim:
            claimName: {{ include "continuum-platform.feature-base.fullname" . }}-cache
      {{- with .Values.featureBase.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.featureBase.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
