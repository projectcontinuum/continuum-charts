{{- if .Values.messageBridge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-platform.message-bridge.fullname" . }}
  labels:
    app.kubernetes.io/component: message-bridge
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.messageBridge.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: message-bridge
      {{- include "continuum-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: message-bridge
        {{- include "continuum-platform.selectorLabels" . | nindent 8 }}
        {{- include "continuum-platform.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              KAFKA_BROKER=$(echo "{{ .Values.infra.kafka.brokerList }}" | tr ',' '\n' | head -1 | sed 's|.*://||')
              KAFKA_HOST=$(echo $KAFKA_BROKER | cut -d: -f1)
              KAFKA_PORT=$(echo $KAFKA_BROKER | cut -d: -f2)
              until nc -z $KAFKA_HOST $KAFKA_PORT; do
                echo "Waiting for Kafka..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-mosquitto
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.infra.mosquitto.host }} {{ .Values.infra.mosquitto.port }}; do
                echo "Waiting for Mosquitto..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.infra.postgresql.host }} {{ .Values.infra.postgresql.port }}; do
                echo "Waiting for PostgreSQL..."; sleep 5;
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: message-bridge
          image: "{{ .Values.messageBridge.image.repository }}:{{ .Values.messageBridge.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: CONTINUUM_KAFKA_MAIN_BROKER_LIST
              value: {{ .Values.infra.kafka.brokerList | quote }}
            - name: CONTINUUM_KAFKA_MAIN_SCHEMA_REGISTRY
              value: {{ .Values.infra.schemaRegistry.url | quote }}
            - name: JAVA_TOOL_OPTIONS
              value: "-Dcontinuum.core.bridge.mqtt.server-uri={{ include "continuum-platform.infra.mosquitto.uri" . }}"
            - name: CONTINUUM_DB_URL
              value: {{ include "continuum-platform.infra.db.url" . | quote }}
            - name: CONTINUUM_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.postgresql.secretName" . }}
                  key: username
            - name: CONTINUUM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "continuum-platform.postgresql.secretName" . }}
                  key: password
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.messageBridge.resources | nindent 12 }}
      {{- with .Values.messageBridge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.messageBridge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
