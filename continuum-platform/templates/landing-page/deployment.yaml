{{- if .Values.landingPage.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-platform.landing-page.fullname" . }}
  labels:
    app.kubernetes.io/component: landing-page
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.landingPage.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: landing-page
      {{- include "continuum-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: landing-page
        {{- include "continuum-platform.selectorLabels" . | nindent 8 }}
        {{- include "continuum-platform.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: landing-page
          image: "{{ .Values.landingPage.image.repository }}:{{ .Values.landingPage.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.landingPage.image.pullPolicy | default .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.landingPage.resources | nindent 12 }}
      {{- with .Values.landingPage.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.landingPage.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

