{{- if .Values.workbench.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "continuum-platform.workbench.fullname" . }}
  labels:
    app.kubernetes.io/component: workbench
    {{- include "continuum-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.workbench.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: workbench
    {{- include "continuum-platform.selectorLabels" . | nindent 4 }}
{{- end }}
