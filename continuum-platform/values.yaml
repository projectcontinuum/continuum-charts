# ============================================================
# Global settings
# ============================================================
global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

# ============================================================
# Infrastructure service references
# These MUST match the release name and service names from continuum-infra
# ============================================================
infra:
  releaseName: continuum-infra
  postgresql:
    host: continuum-infra-postgresql
    port: 5432
    database: continuum
  temporal:
    host: continuum-infra-temporal-frontend
    port: 7233
    namespace: default
  kafka:
    brokerList: "PLAINTEXT://continuum-infra-kafka-0.continuum-infra-kafka-headless:19092"
  schemaRegistry:
    url: "http://continuum-infra-schema-registry:8080"
  mosquitto:
    host: continuum-infra-mosquitto
    port: 1883
  minio:
    endpoint: "http://continuum-infra-minio:9000"

# ============================================================
# Secrets
# Provide credentials directly or reference existing secrets
# ============================================================
secrets:
  # Option 1: Inline credentials (dev/staging)
  postgresql:
    username: continuum_owner
    password: ""                   # REQUIRED — override via --set or values-dev.yaml
  minio:
    rootUser: ""                   # REQUIRED
    rootPassword: ""               # REQUIRED
  # Option 2: Use existing secrets (production — Vault, External Secrets, etc.)
  existingPostgresqlSecret: ""     # Secret with keys: username, password
  existingMinioSecret: ""          # Secret with keys: root-user, root-password

# ============================================================
# Storage configuration (S3/MinIO)
# ============================================================
storage:
  type: minio
  bucketName: continuum-worker-storage
  bucketRegion: us-east-2
  bucketBasePath: workflow-data

# ============================================================
# Local cache storage (PVC for temporary workflow data)
# ============================================================
cacheStorage:
  mountPath: /data/continuum-cache
  size: 5Gi
  storageClassName: ""
  accessMode: ReadWriteOnce

# ============================================================
# continuum-cloud-gateway (reverse proxy / single entry point)
# ============================================================
cloudGateway:
  enabled: true
  image:
    repository: projectcontinuum/continuum-cloud-gateway
    tag: "0.0.11"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# continuum-api-server
# ============================================================
apiServer:
  enabled: true
  image:
    repository: projectcontinuum/continuum-api-server
    tag: "0.0.10"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# continuum-orchestration-service
# ============================================================
orchestrationService:
  enabled: true
  image:
    repository: projectcontinuum/continuum-orchestration-service
    tag: "0.0.10"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# continuum-cluster-manager
# ============================================================
clusterManager:
  enabled: true
  image:
    repository: projectcontinuum/continuum-cluster-manager
    tag: "0.0.10"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  # Workbench instance configuration
  workbench:
    # Namespace where workbench instances will be created (configurable per env)
    namespace: continuum-workbench
    # Default image for workbench instances
    defaultImage: projectcontinuum/continuum-workbench:latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# continuum-credentials-server
# ============================================================
credentialsServer:
  enabled: true
  image:
    repository: projectcontinuum/continuum-credentials-server
    tag: "0.0.11"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  encryption:
    # Generate a 32-byte (256-bit) key: openssl rand -base64 32
    masterKey: ""                  # REQUIRED — Base64-encoded 256-bit AES key
  existingEncryptionSecret: ""     # Alternative: reference an existing secret with key: master-key
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# continuum-message-bridge
# ============================================================
messageBridge:
  enabled: true
  image:
    repository: projectcontinuum/continuum-message-bridge
    tag: "0.0.10"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}


# ============================================================
# Feature Workers (horizontally scalable)
# ============================================================
featureBase:
  enabled: true
  image:
    repository: projectcontinuum/continuum-feature-base
    tag: "0.0.5"
    pullPolicy: IfNotPresent
  replicas: 1
  taskQueue: CONTINUUM_FEATURE_BASE_TASK_QUEUE
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

featureCheminformatics:
  enabled: true
  image:
    repository: projectcontinuum/continuum-feature-cheminformatics
    tag: "0.0.3"
    pullPolicy: IfNotPresent
  replicas: 1
  taskQueue: CONTINUUM_CHEMINFORMATICS_WORKER_TASK_QUEUE
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

