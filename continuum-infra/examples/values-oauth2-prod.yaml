# =============================================================================
# OAuth2 Proxy — Production Configuration with External Secrets
# =============================================================================
# This example shows how to configure oauth2-proxy with externally managed
# secrets in production. Merge this with your environment-specific values file.
#
# Before deploying, create the required secrets:
#   kubectl apply -f examples/oauth2-proxy-secrets.yaml -n continuum-prod
# Or use the interactive script:
#   ./examples/create-oauth2-secrets.sh continuum-prod
# =============================================================================

oauth2Proxy:
  enabled: true

  # Your application's public hostname
  publicHost: "app.continuum.io"

  # Reference the externally created cookie secret
  cookie:
    existingSecret: "oauth2-proxy-cookie"
    secure: true
    expire: "168h"    # 7 days
    refresh: "1h"

  # Upstream application that receives authenticated requests
  upstreamUrl: "http://continuum-platform-api:8080/"

  # Email domains allowed (use specific domains in production)
  emailDomains:
    - "yourcompany.com"
    - "yourcompany.io"

  providers:
    # ---- Google ----
    google:
      enabled: true
      existingSecret: "oauth2-proxy-google"
      callbackPath: "/oauth2/google/callback"
      # Restrict to specific Google Workspace domain
      # emailDomains:
      #   - "yourcompany.com"
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # ---- GitHub ----
    github:
      enabled: true
      existingSecret: "oauth2-proxy-github"
      callbackPath: "/oauth2/github/callback"
      # Restrict to members of your GitHub organization
      githubOrg: "your-github-org"
      # Optionally restrict to specific team(s)
      # githubTeam: "engineering,devops"
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # ---- Microsoft / Azure AD ----
    microsoft:
      enabled: true
      existingSecret: "oauth2-proxy-microsoft"
      callbackPath: "/oauth2/microsoft/callback"
      # Your Azure AD tenant ID (not "common" for single-tenant)
      azureTenant: "your-tenant-id-here"
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # ---- LinkedIn ----
    linkedin:
      enabled: false  # Enable if needed
      existingSecret: "oauth2-proxy-linkedin"
      callbackPath: "/oauth2/linkedin/callback"
      replicas: 1

# Enable ingress for oauth2 endpoints
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    oauth2:
      host: app.continuum.io
  tls:
    - secretName: continuum-tls
      hosts:
        - app.continuum.io

