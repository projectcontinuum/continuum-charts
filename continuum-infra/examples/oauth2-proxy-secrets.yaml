# =============================================================================
# OAuth2 Proxy External Secrets Examples
# =============================================================================
# These are example Kubernetes Secret manifests for oauth2-proxy.
# In production, use a secrets management solution like:
#   - External Secrets Operator (with AWS Secrets Manager, HashiCorp Vault, etc.)
#   - Sealed Secrets
#   - SOPS
#
# To use these secrets, reference them in your values file:
#   oauth2Proxy:
#     cookie:
#       existingSecret: "oauth2-proxy-cookie"
#     providers:
#       google:
#         existingSecret: "oauth2-proxy-google"
#
# Apply with: kubectl apply -f oauth2-proxy-secrets.yaml -n <namespace>
# =============================================================================

---
# -----------------------------------------------------------------------------
# Shared Cookie Secret
# -----------------------------------------------------------------------------
# The cookie secret must be 16, 24, or 32 bytes for AES encryption.
# Generate with: openssl rand -base64 32 | head -c 32
# Or: python3 -c "import secrets; print(secrets.token_urlsafe(32)[:32])"
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-cookie
  labels:
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/part-of: continuum
type: Opaque
stringData:
  # IMPORTANT: Replace with a securely generated 32-byte secret!
  cookie-secret: "REPLACE_WITH_32_BYTE_SECRET_HERE"

---
# -----------------------------------------------------------------------------
# Google OAuth2 Credentials
# -----------------------------------------------------------------------------
# Create OAuth credentials at: https://console.cloud.google.com/apis/credentials
# - Application type: Web application
# - Authorized redirect URIs: https://your-domain.com/oauth2/google/callback
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-google
  labels:
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/oauth2-provider: google
    app.kubernetes.io/part-of: continuum
type: Opaque
stringData:
  client-id: "your-google-client-id.apps.googleusercontent.com"
  client-secret: "your-google-client-secret"

---
# -----------------------------------------------------------------------------
# GitHub OAuth2 Credentials
# -----------------------------------------------------------------------------
# Create OAuth App at: https://github.com/settings/developers
# - Homepage URL: https://your-domain.com
# - Authorization callback URL: https://your-domain.com/oauth2/github/callback
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-github
  labels:
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/oauth2-provider: github
    app.kubernetes.io/part-of: continuum
type: Opaque
stringData:
  client-id: "your-github-client-id"
  client-secret: "your-github-client-secret"

---
# -----------------------------------------------------------------------------
# Microsoft / Azure AD OAuth2 Credentials
# -----------------------------------------------------------------------------
# Register app at: https://portal.azure.com/#blade/Microsoft_AAD_RegisteredApps
# - Redirect URI: https://your-domain.com/oauth2/microsoft/callback
# - API Permissions: Microsoft Graph > User.Read, email, openid, profile
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-microsoft
  labels:
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/oauth2-provider: microsoft
    app.kubernetes.io/part-of: continuum
type: Opaque
stringData:
  client-id: "your-azure-app-client-id"
  client-secret: "your-azure-app-client-secret"

---
# -----------------------------------------------------------------------------
# LinkedIn OAuth2 Credentials
# -----------------------------------------------------------------------------
# Create app at: https://www.linkedin.com/developers/apps
# - Authorized redirect URLs: https://your-domain.com/oauth2/linkedin/callback
# - Products: Sign In with LinkedIn using OpenID Connect
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-linkedin
  labels:
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/oauth2-provider: linkedin
    app.kubernetes.io/part-of: continuum
type: Opaque
stringData:
  client-id: "your-linkedin-client-id"
  client-secret: "your-linkedin-client-secret"

