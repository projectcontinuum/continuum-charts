apiVersion: v2
name: continuum-infra
description: Infrastructure services for Project Continuum — Temporal, Kafka, PostgreSQL, MinIO, Mosquitto
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - continuum
  - infrastructure
  - temporal
  - kafka
  - cassandra
  - elasticsearch
  - minio
  - postgresql
  - mosquitto
maintainers:
  - name: Project Continuum
home: https://github.com/projectcontinuum

dependencies:
  - name: temporal
    version: ">=1.0.0-0"
    repository: "https://go.temporal.io/helm-charts/"
    condition: temporal.enabled
  - name: cassandra
    version: "~12.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: cassandra.enabled
  - name: elasticsearch
    version: "~22.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: elasticsearch.enabled
