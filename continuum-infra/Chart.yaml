apiVersion: v2
name: continuum-infra
description: Infrastructure services for Project Continuum — Temporal, Kafka, PostgreSQL, MinIO, Mosquitto, Theia Cloud
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - continuum
  - infrastructure
  - temporal
  - kafka
  - cassandra
  - elasticsearch
  - minio
  - postgresql
  - mosquitto
  - theia-cloud
maintainers:
  - name: Project Continuum
home: https://github.com/projectcontinuum

dependencies:
  - name: temporal
    version: ">=1.0.0-0"
    repository: "https://go.temporal.io/helm-charts/"
    condition: temporal.enabled
  - name: cassandra
    version: "~12.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: cassandra.enabled
  - name: elasticsearch
    version: "~22.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: elasticsearch.enabled
  - name: theia-cloud-base
    version: "~1.1.2"
    repository: "https://eclipse-theia.github.io/theia-cloud-helm"
    condition: theia-cloud-base.enabled
  - name: theia-cloud-crds
    version: "~1.1.2"
    repository: "https://eclipse-theia.github.io/theia-cloud-helm"
    condition: theia-cloud-crds.enabled
  - name: theia-cloud
    version: "~1.1.3"
    repository: "https://eclipse-theia.github.io/theia-cloud-helm"
    condition: theia-cloud.enabled
