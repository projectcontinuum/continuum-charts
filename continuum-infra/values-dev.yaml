# =============================================================================
# Project Continuum — Development Environment Overrides
# =============================================================================
# Usage:
#   helm install continuum-infra ./continuum-infra -f continuum-infra/values.yaml -f continuum-infra/values-dev.yaml -n continuum-dev --create-namespace
#
# This file supplies non-secret default passwords and reduced resource requests
# suitable for a local or shared development cluster (e.g. kind, minikube,
# Docker Desktop, or a lightweight cloud dev namespace).
#
# WARNING: The credentials below are for DEVELOPMENT ONLY.  Never use these
# values in staging or production.
# =============================================================================

# -----------------------------------------------------------------------------
# Global
# -----------------------------------------------------------------------------
global:
  imagePullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# PostgreSQL
# -----------------------------------------------------------------------------
postgresql:
  auth:
    postgresPassword: "dev-postgres-pass"
    continuumPassword: "dev-continuum-pass"

  persistence:
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Cassandra — disabled in dev (Temporal uses PostgreSQL instead)
# -----------------------------------------------------------------------------
cassandra:
  enabled: false

# -----------------------------------------------------------------------------
# Elasticsearch — disabled in dev (Temporal uses standard SQL visibility)
# -----------------------------------------------------------------------------
elasticsearch:
  enabled: false

# -----------------------------------------------------------------------------
# Temporal — use PostgreSQL for persistence instead of Cassandra + Elasticsearch
# -----------------------------------------------------------------------------
temporal:
  server:
    config:
      persistence:
        datastores:
          # Override: use SQL/PostgreSQL instead of Cassandra
          default:
            sql:
              pluginName: postgres12
              databaseName: temporal
              connectAddr: "continuum-infra-postgresql:5432"
              connectProtocol: "tcp"
              user: postgres
              password: "dev-postgres-pass"
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
          # Override: use SQL/PostgreSQL instead of Elasticsearch
          visibility:
            sql:
              pluginName: postgres12
              databaseName: temporal_visibility
              connectAddr: "continuum-infra-postgresql:5432"
              connectProtocol: "tcp"
              user: postgres
              password: "dev-postgres-pass"
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"

    # Single replica for every Temporal service in dev.
    frontend:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      podDisruptionBudget:
        minAvailable: 0

    history:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      podDisruptionBudget:
        minAvailable: 0

    matching:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      podDisruptionBudget:
        minAvailable: 0

    worker:
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
      podDisruptionBudget:
        minAvailable: 0

  admintools:
    enabled: true

  web:
    enabled: true

# -----------------------------------------------------------------------------
# Temporal Search Attribute Init
# -----------------------------------------------------------------------------
temporalSearchInit:
  enabled: true

# -----------------------------------------------------------------------------
# Kafka
# -----------------------------------------------------------------------------
kafka:
  # Single broker is sufficient for dev.
  replicas: 1

  persistence:
    size: 5Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  podDisruptionBudget:
    enabled: false

  topologySpreadConstraints:
    enabled: false

  # Set replication factors to 1 for single-broker dev setup
  config:
    autoCreateTopics: "true"
    logRetentionHours: 168
    defaultReplicationFactor: "1"
    minInsyncReplicas: "1"
    offsetsTopicReplicationFactor: "1"
    transactionStateLogReplicationFactor: "1"
    transactionStateLogMinIsr: "1"

# -----------------------------------------------------------------------------
# Schema Registry
# -----------------------------------------------------------------------------
schemaRegistry:
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -----------------------------------------------------------------------------
# Kafka UI
# -----------------------------------------------------------------------------
kafkaUi:
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -----------------------------------------------------------------------------
# Mosquitto
# -----------------------------------------------------------------------------
mosquitto:
  persistence:
    size: 256Mi
    logSize: 128Mi

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -----------------------------------------------------------------------------
# MinIO
# -----------------------------------------------------------------------------
minio:
  auth:
    rootUser: "dev-minio-root"
    rootPassword: "dev-minio-secret"

  persistence:
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
