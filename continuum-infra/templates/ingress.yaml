{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "continuum-infra.fullname" . }}-uis
  labels:
    {{- include "continuum-infra.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if and .Values.temporal.enabled .Values.temporal.web.enabled .Values.ingress.hosts.temporalUi }}
    - host: {{ .Values.ingress.hosts.temporalUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.temporalUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-temporal-web
                port:
                  number: 8080
    {{- end }}
    {{- if and .Values.kafkaUi.enabled .Values.ingress.hosts.kafkaUi }}
    - host: {{ .Values.ingress.hosts.kafkaUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.kafkaUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.kafka-ui.fullname" . }}
                port:
                  number: 8080
    {{- end }}
    {{- if and .Values.minio.enabled .Values.ingress.hosts.minioConsole }}
    - host: {{ .Values.ingress.hosts.minioConsole.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.minioConsole.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.minio.fullname" . }}
                port:
                  number: 9001
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{/* Mosquitto WebSocket gets a separate Ingress for long-lived connection annotations */}}
{{- if and .Values.mosquitto.enabled .Values.ingress.hosts.mosquitto }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "continuum-infra.fullname" . }}-mosquitto
  labels:
    {{- include "continuum-infra.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.mosquitto.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.mosquitto.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.fullname" . }}-mosquitto
                port:
                  number: {{ .Values.mosquitto.config.websocketPort | default 1884 }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
