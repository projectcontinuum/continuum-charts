{{- if .Values.ingress.enabled }}
{{- $fullname := include "continuum-infra.fullname" . }}
{{- $oauth2Enabled := and .Values.oauth2Proxy.enabled .Values.ingress.oauth2Auth.enabled }}
{{- $oauth2Provider := .Values.ingress.oauth2Auth.provider | default "google" }}
{{- $oauth2Host := .Values.oauth2Proxy.publicHost | default ((.Values.ingress.hosts.oauth2).host | default "localhost") }}
{{- $oauth2Scheme := ternary "https" "http" (gt (len .Values.ingress.tls) 0) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-uis
  labels:
    {{- include "continuum-infra.labels" . | nindent 4 }}
  annotations:
    {{- if eq (len .Values.ingress.tls) 0 }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
    {{- if $oauth2Enabled }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ $fullname }}-oauth2-proxy-{{ $oauth2Provider }}.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/{{ $oauth2Provider }}/auth"
    nginx.ingress.kubernetes.io/auth-signin: "{{ $oauth2Scheme }}://{{ $oauth2Host }}/oauth2/{{ $oauth2Provider }}/start?rd={{ $oauth2Scheme }}://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    nginx.ingress.kubernetes.io/auth-signin-redirect-param: "rd"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if and .Values.temporal.enabled .Values.temporal.web.enabled .Values.ingress.hosts.temporalUi }}
    - host: {{ .Values.ingress.hosts.temporalUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.temporalUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-temporal-web
                port:
                  number: 8080
    {{- end }}
    {{- if and .Values.kafkaUi.enabled .Values.ingress.hosts.kafkaUi }}
    - host: {{ .Values.ingress.hosts.kafkaUi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.kafkaUi.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.kafka-ui.fullname" . }}
                port:
                  number: 8080
    {{- end }}
    {{- if and .Values.minio.enabled .Values.ingress.hosts.minioConsole }}
    - host: {{ .Values.ingress.hosts.minioConsole.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.minioConsole.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.minio.fullname" . }}
                port:
                  number: 9001
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{/* Mosquitto WebSocket gets a separate Ingress for long-lived connection annotations */}}
{{- if and .Values.mosquitto.enabled .Values.ingress.hosts.mosquitto }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "continuum-infra.fullname" . }}-mosquitto
  labels:
    {{- include "continuum-infra.labels" . | nindent 4 }}
  annotations:
    {{- if eq (len .Values.ingress.tls) 0 }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.mosquitto.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.mosquitto.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "continuum-infra.fullname" . }}-mosquitto
                port:
                  number: {{ .Values.mosquitto.config.websocketPort | default 1884 }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
