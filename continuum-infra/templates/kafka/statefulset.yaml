{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "continuum-infra.kafka.fullname" . }}
  labels:
    app.kubernetes.io/component: kafka
    {{- include "continuum-infra.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "continuum-infra.kafka.fullname" . }}-headless
  replicas: {{ .Values.kafka.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka
      {{- include "continuum-infra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kafka
        {{- include "continuum-infra.selectorLabels" . | nindent 8 }}
        {{- include "continuum-infra.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.kafka.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.kafka.topologySpreadConstraints.maxSkew | default 1 }}
          topologyKey: {{ .Values.kafka.topologySpreadConstraints.topologyKey | default "kubernetes.io/hostname" }}
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: kafka
              {{- include "continuum-infra.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 19092
              name: broker
              protocol: TCP
            - containerPort: 9093
              name: controller
              protocol: TCP
          command:
            - sh
            - -c
            - |
              export KAFKA_NODE_ID=$((${HOSTNAME##*-} + 1))
              export KAFKA_ADVERTISED_LISTENERS="BROKER://{{ include "continuum-infra.kafka.fullname" . }}-${HOSTNAME##*-}.{{ include "continuum-infra.kafka.fullname" . }}-headless:19092"
              {{- $fullname := include "continuum-infra.kafka.fullname" . }}
              {{- $replicas := int .Values.kafka.replicas }}
              export KAFKA_CONTROLLER_QUORUM_VOTERS="{{ range $i := until $replicas }}{{ if $i }},{{ end }}{{ add $i 1 }}@{{ $fullname }}-{{ $i }}.{{ $fullname }}-headless:9093{{ end }}"
              exec /etc/confluent/docker/run
          env:
            - name: KAFKA_LISTENERS
              value: "BROKER://:19092,CONTROLLER://:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: BROKER
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT
            - name: KAFKA_PROCESS_ROLES
              value: "controller,broker"
            - name: TOPIC_AUTO_CREATE
              value: {{ .Values.kafka.config.autoCreateTopics | default "true" | quote }}
            - name: KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL
              value: "http://{{ include "continuum-infra.schema-registry.fullname" . }}:{{ .Values.schemaRegistry.service.port | default 8080 }}"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
            - name: KAFKA_LOG_RETENTION_HOURS
              value: {{ .Values.kafka.config.logRetentionHours | default 168 | quote }}
            {{- if .Values.kafka.config.defaultReplicationFactor }}
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: {{ .Values.kafka.config.defaultReplicationFactor | quote }}
            {{- end }}
            {{- if .Values.kafka.config.minInsyncReplicas }}
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: {{ .Values.kafka.config.minInsyncReplicas | quote }}
            {{- end }}
            {{- if .Values.kafka.config.offsetsTopicReplicationFactor }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: {{ .Values.kafka.config.offsetsTopicReplicationFactor | quote }}
            {{- end }}
            {{- if .Values.kafka.config.transactionStateLogReplicationFactor }}
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: {{ .Values.kafka.config.transactionStateLogReplicationFactor | quote }}
            {{- end }}
            {{- if .Values.kafka.config.transactionStateLogMinIsr }}
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: {{ .Values.kafka.config.transactionStateLogMinIsr | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:19092 > /dev/null 2>&1
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:19092 > /dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:19092 > /dev/null 2>&1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
      {{- with .Values.kafka.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size | default "20Gi" }}
{{- end }}
