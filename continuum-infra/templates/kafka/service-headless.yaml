{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "continuum-infra.kafka.fullname" . }}-headless
  labels:
    app.kubernetes.io/component: kafka
    {{- include "continuum-infra.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 19092
      targetPort: broker
      protocol: TCP
      name: broker
    - port: 9093
      targetPort: controller
      protocol: TCP
      name: controller
  selector:
    app.kubernetes.io/component: kafka
    {{- include "continuum-infra.selectorLabels" . | nindent 4 }}
{{- end }}
