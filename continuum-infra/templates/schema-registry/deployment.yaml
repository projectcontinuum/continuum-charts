{{- if .Values.schemaRegistry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-infra.schema-registry.fullname" . }}
  labels:
    app.kubernetes.io/component: schema-registry
    {{- include "continuum-infra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.schemaRegistry.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: schema-registry
      {{- include "continuum-infra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: schema-registry
        {{- include "continuum-infra.selectorLabels" . | nindent 8 }}
        {{- include "continuum-infra.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "continuum-infra.kafka.fullname" . }}-0.{{ include "continuum-infra.kafka.fullname" . }}-headless 19092; do echo "Waiting for Kafka..."; sleep 5; done']
      containers:
        - name: schema-registry
          image: "{{ .Values.schemaRegistry.image.repository }}:{{ .Values.schemaRegistry.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.schemaRegistry.service.port | default 8080 }}
              name: http
              protocol: TCP
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: {{ include "continuum-infra.kafka.brokerList" . | quote }}
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:{{ .Values.schemaRegistry.service.port | default 8080 }}"
          livenessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.schemaRegistry.resources | nindent 12 }}
{{- end }}
