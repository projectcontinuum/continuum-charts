{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "continuum-infra.postgresql.secretName" . }}
  labels:
    app.kubernetes.io/component: postgresql
    {{- include "continuum-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ required "postgresql.auth.postgresPassword is required" .Values.postgresql.auth.postgresPassword | quote }}
  continuum-db-user: {{ .Values.postgresql.auth.continuumUser | quote }}
  continuum-db-password: {{ required "postgresql.auth.continuumPassword is required" .Values.postgresql.auth.continuumPassword | quote }}
  continuum-db-name: {{ .Values.postgresql.auth.continuumDatabase | quote }}
{{- end }}
