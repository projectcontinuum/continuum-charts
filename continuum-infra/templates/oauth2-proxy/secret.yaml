{{- if .Values.oauth2Proxy.enabled }}
{{- $root := . }}
{{- $fullname := include "continuum-infra.fullname" . }}
{{- $globalCookie := .Values.oauth2Proxy.cookie }}

{{/* Create the shared cookie secret if not using an existing one */}}
{{- if not $globalCookie.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-oauth2-proxy-cookie
  labels:
    {{- include "continuum-infra.labels" $root | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
type: Opaque
data:
  {{- if $globalCookie.secret }}
  cookie-secret: {{ $globalCookie.secret | b64enc | quote }}
  {{- else }}
  # WARNING: Auto-generated secret. Override in production!
  cookie-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}

{{/* Create per-provider secrets for client credentials */}}
{{- range $providerName, $provider := .Values.oauth2Proxy.providers }}
{{- if and $provider.enabled (not $provider.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-oauth2-proxy-{{ $providerName }}
  labels:
    {{- include "continuum-infra.labels" $root | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/oauth2-provider: {{ $providerName }}
type: Opaque
data:
  {{- if $provider.clientId }}
  client-id: {{ $provider.clientId | b64enc | quote }}
  {{- else }}
  client-id: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $provider.clientSecret }}
  client-secret: {{ $provider.clientSecret | b64enc | quote }}
  {{- else }}
  client-secret: {{ "" | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

