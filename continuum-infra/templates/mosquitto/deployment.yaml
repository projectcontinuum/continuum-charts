{{- if .Values.mosquitto.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-infra.mosquitto.fullname" . }}
  labels:
    app.kubernetes.io/component: mosquitto
    {{- include "continuum-infra.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: mosquitto
      {{- include "continuum-infra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mosquitto
        {{- include "continuum-infra.selectorLabels" . | nindent 8 }}
        {{- include "continuum-infra.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mosquitto
          image: "{{ .Values.mosquitto.image.repository }}:{{ .Values.mosquitto.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.mosquitto.config.tcpPort | default 1883 }}
              name: mqtt
              protocol: TCP
            - containerPort: {{ .Values.mosquitto.config.websocketPort | default 1884 }}
              name: websocket
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.mosquitto.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config
            {{- if .Values.mosquitto.persistence.enabled }}
            - name: data
              mountPath: /mosquitto/data
            - name: log
              mountPath: /mosquitto/log
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "continuum-infra.mosquitto.fullname" . }}-config
        {{- if .Values.mosquitto.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "continuum-infra.mosquitto.fullname" . }}-data
        - name: log
          persistentVolumeClaim:
            claimName: {{ include "continuum-infra.mosquitto.fullname" . }}-log
        {{- end }}
{{- end }}
