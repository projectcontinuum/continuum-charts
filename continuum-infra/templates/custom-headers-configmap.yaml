{{- if and .Values.ingress.enabled .Values.oauth2Proxy.enabled .Values.ingress.oauth2Auth.enabled }}
{{- $fullname := include "continuum-infra.fullname" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-custom-headers
  labels:
    {{- include "continuum-infra.labels" . | nindent 4 }}
data:
  # Map X-Auth-Request-Email to X-Continuum-User-Id for backend services
  # $authHeader1 is set by nginx ingress from the oauth2-proxy auth response
  X-Continuum-User-Id: "$authHeader1"
{{- end }}


