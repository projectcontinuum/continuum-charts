{{- if .Values.kafkaUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "continuum-infra.kafka-ui.fullname" . }}
  labels:
    app.kubernetes.io/component: kafka-ui
    {{- include "continuum-infra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafkaUi.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka-ui
      {{- include "continuum-infra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kafka-ui
        {{- include "continuum-infra.selectorLabels" . | nindent 8 }}
        {{- include "continuum-infra.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka-ui
          image: "{{ .Values.kafkaUi.image.repository }}:{{ .Values.kafkaUi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: continuum
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ include "continuum-infra.kafka.brokerList" . | quote }}
            - name: KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL
              value: PLAINTEXT
            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: "http://{{ include "continuum-infra.schema-registry.fullname" . }}:{{ .Values.schemaRegistry.service.port | default 8080 }}"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.kafkaUi.resources | nindent 12 }}
{{- end }}
